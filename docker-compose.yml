# ─────────────────────────────────────────────────────────────────────────────
# HUB RW Meta Hub — orquestração Docker.
#   1) cp .env.example .env   (e preencha PUBLIC_URL, SESSION_SECRET, ADMIN_PASSWORD…)
#   2) docker compose up -d --build
#
# A porta INTERNA do container é fixada em 3300; escolha a porta do host com
# HOST_PORT (padrão 3300). Ex.: HOST_PORT=8080 docker compose up -d
# ─────────────────────────────────────────────────────────────────────────────
services:
  hub-rw-meta:
    build:
      context: .
      dockerfile: Dockerfile
    image: hub-rw-meta:latest
    container_name: hub-rw-meta
    restart: unless-stopped

    # Configuração e segredos (PUBLIC_URL, SESSION_SECRET, ADMIN_PASSWORD, META_*…).
    env_file:
      - .env

    # Porta interna fixa em 3300 (sobrepõe qualquer PORT do .env); host = HOST_PORT.
    environment:
      - PORT=3300
    ports:
      - "${HOST_PORT:-3300}:3300"

    # Persistencia dos arquivos JSON quando DATABASE_URL nao estiver definido.
    volumes:
      - hub-rw-meta-data:/app/data

volumes:
  hub-rw-meta-data:
    driver: local
