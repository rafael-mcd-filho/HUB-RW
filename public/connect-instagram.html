<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Instagram · HUB RW</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="/texts-data.js"></script>
  <script src="/texts.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#f3f4f7;--card:#fff;--text:#0a0d15;--muted:#5b6473;--border:#e7e9f1;--accent:#e1306c;--accentText:#b81e54;--danger:#e5484d}
    body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:1rem;color:var(--text);background:radial-gradient(760px 440px at 100% -10%,rgba(225,48,108,.16),transparent 60%),var(--bg)}
    .box{text-align:center;padding:2.4rem 2rem;max-width:440px;width:100%;background:var(--card);border:1px solid var(--border);border-radius:20px;box-shadow:0 30px 70px -22px rgba(8,12,22,.45)}
    h3{font-size:1.15rem;font-weight:800;letter-spacing:-.02em;margin-bottom:.5rem}
    p{font-size:.875rem;color:var(--muted);line-height:1.55}
    .spinner{width:38px;height:38px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:1.1rem auto 0;display:none}
    @keyframes spin{to{transform:rotate(360deg)}}
    .error{color:var(--danger);margin-top:1rem;font-size:.85rem;background:rgba(229,72,77,.1);border:1px solid rgba(229,72,77,.3);border-radius:10px;padding:.75rem 1rem;display:none;white-space:pre-line;text-align:left}
    button{margin-top:1.3rem;padding:.7rem 1.5rem;background:var(--accent);color:#fff;border:none;border-radius:11px;font-size:.9rem;font-weight:700;cursor:pointer;box-shadow:0 12px 26px -10px rgba(225,48,108,.85);transition:transform .12s,filter .15s}
    button:hover{transform:translateY(-1px);filter:brightness(1.05)}
    button:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
    .promo-foot{margin-top:1.3rem;font-size:.76rem;color:var(--muted);text-align:center}
    .promo-foot a{color:var(--accentText);font-weight:700;text-decoration:none}
  </style>
</head>
<body>
  <div class="box">
    <img src="/assets/instagram.png" alt="Instagram" style="width:56px;height:56px;object-fit:contain;margin:0 auto 1rem;display:block" />
    <h3 id="title"></h3>
    <p id="msg"></p>
    <div class="spinner" id="spinner"></div>
    <div class="error" id="err"></div>
    <button id="btn" onclick="startAuth()"></button>
  </div>
  <div class="promo-foot" id="promoFoot"></div>

  <script>
    var AUTH_URL = '{{AUTH_URL}}';
    function T(k, v){ return window.TEXTS ? window.TEXTS.t(k, v) : k; }

    (function initStatic(){
      document.title = T('cpop.ig.title') + ' · HUB RW';
      document.getElementById('title').textContent = T('cpop.ig.title');
      document.getElementById('msg').textContent = T('cpop.ig.intro');
      document.getElementById('btn').textContent = T('cpop.connectBtn');
      document.getElementById('promoFoot').textContent = T('result.footer');
    })();

    function startAuth(){
      var btn = document.getElementById('btn');
      btn.disabled = true;
      document.getElementById('msg').textContent = T('cpop.ig.redirecting');
      document.getElementById('spinner').style.display = 'block';
      if(!AUTH_URL){
        document.getElementById('spinner').style.display = 'none';
        var el = document.getElementById('err'); el.textContent = T('cpop.ig.appMissing'); el.style.display = 'block';
        btn.disabled = false;
        return;
      }
      window.location.href = AUTH_URL;
    }
  </script>
</body>
</html>
